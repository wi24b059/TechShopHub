<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Warenkorb – TechShopHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../res/css/style.css">
    <script src="../js/navbar.js" defer></script>
    <script src="../js/cart.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', initCart);
    </script>
</head>
<body class="bg-light">

<div class="container-lg">
    <h1 class="mb-4 mt-4">🛒 Warenkorb</h1>

    <div id="cart-empty-message" class="alert alert-info" hidden>
        <p>Dein Warenkorb ist leer!</p>
        <a href="../index.html" class="btn btn-primary">Zum Einkaufen</a>
    </div>

    <div id="cart-table-container" class="table-responsive mb-4">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th style="width: 80px;">Bild</th>
                    <th style="width: 40%;">Produkt</th>
                    <th style="width: 12%;">Preis</th>
                    <th style="width: 12%;">Anzahl</th>
                    <th style="width: 12%;">Summe</th>
                    <th style="width: 10%;">Aktion</th>
                </tr>
            </thead>
            <tbody id="cart-items-tbody"></tbody>
        </table>
    </div>

    <div class="row">
        <div class="col-md-8">
            <a href="../index.html" class="btn btn-secondary">← Weitereinkaufen</a>
            <button class="btn btn-warning ms-2" onclick="if(confirm('Leeren?')) { localStorage.removeItem('techshop_cart'); location.reload(); }">🗑️ Leeren</button>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Zusammenfassung</h5>
                    <hr>
                    <div class="d-flex justify-content-between mb-3">
                        <strong>Gesamtpreis:</strong>
                        <strong>€ <span id="cart-total">0.00</span></strong>
                    </div>
                    <button class="btn btn-success w-100" onclick="placeOrder()">✓ Bestellen</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="message-box" class="container-lg mt-4"></div>

</body>
</html>
