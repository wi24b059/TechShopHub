<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mein Konto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../js/navbar.js" defer></script>
    <script src="../js/cart.js" defer></script>
</head>
<body>

<div class="container mt-4">
    <h2>Mein Konto</h2>
    <div id="account-message" class="mb-3"></div>

    <div class="card p-4 mb-4">
        <h5 class="mb-3">Profildaten</h5>
        <form id="profile-form">
            <div class="mb-3">
                <label class="form-label" for="firstname">Vorname</label>
                <input id="firstname" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="lastname">Nachname</label>
                <input id="lastname" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="address">Adresse</label>
                <input id="address" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="zip">PLZ</label>
                <input id="zip" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="city">Ort</label>
                <input id="city" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="payment">Zahlungsinformationen</label>
                <input id="payment" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="profile-current-password">Aktuelles Passwort (Pflicht)</label>
                <input id="profile-current-password" type="password" class="form-control" required>
            </div>

            <button class="btn btn-primary" type="submit">
                Profil speichern
            </button>
        </form>
    </div>

    <div class="card p-4">
        <h5 class="mb-3">Passwort aendern</h5>
        <form id="password-form">
            <div class="mb-3">
                <label class="form-label" for="old-password">Altes Passwort</label>
                <input id="old-password" type="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="new-password">Neues Passwort</label>
                <input id="new-password" type="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="new-password-confirm">Neues Passwort bestaetigen</label>
                <input id="new-password-confirm" type="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-warning">
                Passwort aendern
            </button>
        </form>
    </div>
</div>
<script>
    function showMessage(message, type) {
        const box = document.getElementById('account-message');
        if (!box) return;
        box.innerHTML = `<div class="alert alert-${type} py-2 mb-0">${message}</div>`;
    }

    async function sendJson(payload) {
        const response = await fetch(getApiUrl(), {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });
        return response.json();
    }

    async function loadProfile() {
        const data = await sendJson({ action: 'getProfile' });
        if (data.status !== 'success') {
            showMessage(data.message || 'Profil konnte nicht geladen werden.', 'danger');
            if ((data.message || '').toLowerCase().includes('anmelden')) {
                setTimeout(() => { window.location.href = 'login.html'; }, 900);
            }
            return;
        }

        document.getElementById('firstname').value = data.user.first_name || '';
        document.getElementById('lastname').value = data.user.last_name || '';
        document.getElementById('address').value = data.user.address || '';
        document.getElementById('zip').value = data.user.zip || '';
        document.getElementById('city').value = data.user.city || '';
        document.getElementById('payment').value = data.user.payment_info || '';
    }

    async function handleProfileSave(event) {
        event.preventDefault();

        const currentPassword = document.getElementById('profile-current-password').value;
        if (!currentPassword) {
            showMessage('Bitte aktuelles Passwort zur Bestaetigung eingeben.', 'warning');
            return;
        }

        const data = await sendJson({
            action: 'updateProfile',
            firstname: document.getElementById('firstname').value,
            lastname: document.getElementById('lastname').value,
            address: document.getElementById('address').value,
            zip: document.getElementById('zip').value,
            city: document.getElementById('city').value,
            payment: document.getElementById('payment').value,
            currentPassword: currentPassword
        });

        if (data.status === 'success') {
            showMessage('Profil gespeichert.', 'success');
            document.getElementById('profile-current-password').value = '';
        } else {
            showMessage(data.message || 'Profil konnte nicht gespeichert werden.', 'danger');
        }
    }

    async function handlePasswordChange(event) {
        event.preventDefault();

        const oldPassword = document.getElementById('old-password').value;
        const newPassword = document.getElementById('new-password').value;
        const newPasswordConfirm = document.getElementById('new-password-confirm').value;

        const data = await sendJson({
            action: 'updatePassword',
            oldPassword: oldPassword,
            newPassword: newPassword,
            newPasswordConfirm: newPasswordConfirm
        });

        if (data.status === 'success') {
            showMessage('Passwort erfolgreich geaendert.', 'success');
            document.getElementById('password-form').reset();
        } else {
            showMessage(data.message || 'Passwort konnte nicht geaendert werden.', 'danger');
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('profile-form').addEventListener('submit', handleProfileSave);
        document.getElementById('password-form').addEventListener('submit', handlePasswordChange);
        loadProfile();
    });
</script>
</body>
</html>
