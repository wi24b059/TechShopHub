<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TechShopHub – Registrierung</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="../js/navbar.js" defer></script>
    <script src="../js/script.js" defer></script>
</head>
<body class="bg-light">

<!-- Navbar injected by navbar.js -->

<div class="d-flex justify-content-center py-5">
        <div class="card shadow-sm" style="width: 100%; max-width: 480px;">

            <div class="card-header bg-dark text-white text-center fw-bold fs-5">
                🛒 TechShopHub – Registrierung
            </div>

            <div class="card-body p-4">
                <form id="registerForm">
                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label" for="reg_salutation">Anrede</label>
                            <select id="reg_salutation" name="salutation" class="form-select" required>
                                <option value="">Bitte auswählen</option>
                                <option value="Herr">Herr</option>
                                <option value="Frau">Frau</option>
                                <option value="Divers">Divers</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="reg_firstname">Vorname</label>
                            <input type="text" id="reg_firstname" name="firstname"
                                   class="form-control" minlength="2" maxlength="60"
                                   pattern="[A-Za-zÄÖÜäöüß\s-]+" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="reg_lastname">Nachname</label>
                            <input type="text" id="reg_lastname" name="lastname"
                                   class="form-control" minlength="2" maxlength="60"
                                   pattern="[A-Za-zÄÖÜäöüß\s-]+" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label" for="reg_address">Adresse</label>
                            <input type="text" id="reg_address" name="address"
                                   class="form-control" minlength="5" maxlength="120" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label" for="reg_zip">PLZ</label>
                            <input type="text" id="reg_zip" name="zip"
                                   class="form-control" pattern="[0-9]{4,10}"
                                   inputmode="numeric" required>
                        </div>

                        <div class="col-md-8">
                            <label class="form-label" for="reg_city">Ort</label>
                            <input type="text" id="reg_city" name="city"
                                   class="form-control" minlength="2" maxlength="80"
                                   pattern="[A-Za-zÄÖÜäöüß\s.-]+" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label" for="reg_email">E-Mail</label>
                            <input type="email" id="reg_email" name="email"
                                   class="form-control" autocomplete="email"
                                   maxlength="120" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label" for="reg_username">Benutzername</label>
                            <input type="text" id="reg_username" name="username"
                                   class="form-control" minlength="3" maxlength="30"
                                   pattern="[A-Za-z0-9_.-]+" autocomplete="username" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="reg_pwd1">Passwort</label>
                            <input type="password" id="reg_pwd1" name="password"
                                   class="form-control" minlength="8"
                                   autocomplete="new-password" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="reg_pwd2">Passwort bestätigen</label>
                            <input type="password" id="reg_pwd2" name="password_confirm"
                                   class="form-control" minlength="8"
                                   autocomplete="new-password" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label" for="reg_payment">Zahlungsinformationen</label>
                            <input type="text" id="reg_payment" name="payment"
                                   class="form-control" minlength="3" maxlength="120"
                                   placeholder="z.B. Rechnung" required>
                        </div>

                        <div class="col-12">
                            <button type="submit" class="btn btn-dark w-100">
                                Registrieren
                            </button>
                        </div>

                    </div>
                </form>

                <hr>
                <div class="text-center small">
                    <a href="login.html">Bereits ein Konto? Zum Login</a>
                </div>
            </div>

        </div>
    </div>

    <div id="message-box" class="position-fixed bottom-0 start-50 translate-middle-x mb-3"
         style="z-index: 9999; min-width: 300px;"></div>

</body>
</html>
