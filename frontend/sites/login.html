<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TechShopHub – Login</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="../js/script.js" defer></script>
</head>
<body class="bg-light">

    <!-- Centered login card -->
    <div class="d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-sm" style="width: 100%; max-width: 420px;">

            <div class="card-header bg-dark text-white text-center fw-bold fs-5">
                🛒 TechShopHub – Login
            </div>

            <div class="card-body p-4">
                <form id="loginForm">

                    <div class="mb-3">
                        <label class="form-label" for="login_identifier">
                            Benutzername oder E-Mail
                        </label>
                        <input type="text" id="login_identifier" name="login_identifier"
                               class="form-control" autocomplete="username"
                               minlength="3" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="login_password">Passwort</label>
                        <input type="password" id="login_password" name="login_password"
                               class="form-control" autocomplete="current-password"
                               minlength="8" required>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" id="remember_me" name="remember_me"
                               class="form-check-input">
                        <label class="form-check-label" for="remember_me">
                            Login merken
                        </label>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">Einloggen</button>

                </form>

                <hr>
                <div class="text-center small">
                    <a href="register.html">Noch kein Konto? Hier registrieren</a>
                </div>
            </div>

        </div>
    </div>

    <!-- Message box for login errors -->
    <div id="message-box" class="position-fixed bottom-0 start-50 translate-middle-x mb-3"
         style="z-index: 9999; min-width: 300px;"></div>

</body>
</html>
