<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produktdetails - TechShopHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="../index.html">
            TechShopHub
        </a>
    </div>
</nav>

<div class="container mt-4">

    <div class="row">

        <div class="col-md-5">
            <img id="product-image"
                 class="img-fluid border rounded"
                 src="../res/img/product-placeholder.svg"
                 alt="Produktbild">
        </div>

        <div class="col-md-7">

            <h1 id="product-name"></h1>

            <p class="text-muted">
                Kategorie:
                <span id="product-category"></span>
            </p>

            <h3 class="text-success">
                € <span id="product-price"></span>
            </h3>

            <p>
                Bewertung:
                <span id="product-rating"></span>
            </p>

            <hr>

            <p id="product-description"></p>

            <button id="cart-btn" class="btn btn-primary">
                In den Warenkorb legen
            </button>

        </div>

    </div>

</div>

<script src="../js/cart.js"></script>

<script>

    window.addEventListener('DOMContentLoaded', () => {

        const params = new URLSearchParams(window.location.search);

        document.getElementById('product-name').textContent =
            params.get('name') || 'Produkt';

        document.getElementById('product-category').textContent =
            params.get('category') || '';

        document.getElementById('product-price').textContent =
            params.get('price') || '';

        document.getElementById('product-rating').textContent =
            params.get('rating') || '';

        document.getElementById('product-description').textContent =
            params.get('description') || '';

        document.getElementById('cart-btn')
            .addEventListener('click', () => {

                addToCart({
                    id: Number(params.get('id'))
                });

            });

    });

</script>

</body>
</html>
