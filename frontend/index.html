<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TechShopHub</title>
    <link rel="stylesheet" href="res/css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>

    <!-- =====================================================
         AUTH STATUS BAR
         Shows who is logged in and provides the logout button.
         Updated automatically by JavaScript on page load.
    ====================================================== -->
    <header>
        <h1>🛒 TechShopHub</h1>
        <div id="auth-status" class="status-box">
            <strong>Status:</strong>
            <span id="status-text">Nicht eingeloggt</span>
            <button id="logoutBtn" type="button" hidden>Logout</button>
        </div>
    </header>

    <main>

        <!-- =====================================================
             SHOP SECTION
             Visible to everyone – no login required to browse.
        ====================================================== -->
        <section id="shop">
            <h2>Produkte</h2>

            <!-- Search bar: triggers a live AJAX search as the user types -->
            <input
                type="search"
                id="search-input"
                placeholder="Produkte suchen…"
                autocomplete="off"
            >

            <!-- Category buttons: clicking one loads that category's products -->
            <nav id="category-nav">
                <button class="category-btn active" data-category-id="1">💻 Laptops</button>
                <button class="category-btn"        data-category-id="2">🎧 Headsets</button>
                <button class="category-btn"        data-category-id="3">🖥️ PCs</button>
            </nav>

            <!-- Product cards are injected here by JavaScript -->
            <div id="product-grid">
                <p class="loading-text">Produkte werden geladen…</p>
            </div>
        </section>

        <!-- =====================================================
             ADMIN PANEL
             Hidden by default. JavaScript reveals it when the
             session reports is_admin === true.
        ====================================================== -->
        <section id="admin-panel" hidden>
            <h2>⚙️ Neues Produkt hinzufügen</h2>

            <!-- enctype is required so the browser sends the file correctly -->
            <form id="createProductForm" enctype="multipart/form-data">

                <label for="prod_category">Kategorie:</label>
                <select id="prod_category" name="category_id" required>
                    <option value="">Bitte auswählen</option>
                    <option value="1">Laptops</option>
                    <option value="2">Headsets</option>
                    <option value="3">PCs</option>
                </select>

                <label for="prod_name">Name:</label>
                <input type="text" id="prod_name" name="name" maxlength="150" required>

                <label for="prod_description">Beschreibung:</label>
                <textarea id="prod_description" name="description" rows="3" required></textarea>

                <label for="prod_price">Preis (€):</label>
                <input type="number" id="prod_price" name="price" step="0.01" min="0" required>

                <label for="prod_rating">Bewertung (0–5):</label>
                <input type="number" id="prod_rating" name="rating" step="0.1" min="0" max="5" value="0">

                <label for="prod_image">Produktfoto:</label>
                <input type="file" id="prod_image" name="product_image" accept="image/*" required>

                <button type="submit">Produkt speichern</button>
            </form>

            <div id="admin-message-box"></div>
        </section>

        <!-- =====================================================
             LOGIN FORM
             Always visible so users can log in to access admin features.
        ====================================================== -->
        <section id="login-container">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="login_identifier">Benutzername oder E-Mail:</label>
                <input
                    type="text"
                    id="login_identifier"
                    name="login_identifier"
                    autocomplete="username"
                    minlength="3"
                    required
                >

                <label for="login_password">Passwort:</label>
                <input
                    type="password"
                    id="login_password"
                    name="login_password"
                    autocomplete="current-password"
                    minlength="8"
                    required
                >

                <label class="checkbox-label">
                    <input type="checkbox" id="remember_me" name="remember_me">
                    Login merken
                </label>

                <button type="submit">Einloggen</button>
            </form>
            <p>Noch kein Konto? <a href="./sites/register.html">Hier registrieren</a></p>
        </section>

    </main>

    <!-- Global message box used by showMessage() in script.js -->
    <div id="message-box"></div>

</body>
</html>
